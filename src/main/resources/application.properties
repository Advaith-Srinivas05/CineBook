spring.application.name=CineBook
spring.thymeleaf.cache=false
# Externalize credentials and environment-specific paths.
spring.config.import=optional:application-db.properties

spring.datasource.url=jdbc:postgresql://${cinebook.db.host:localhost}:${cinebook.db.port:5432}/${cinebook.db.database-name:cinebook}
spring.datasource.username=${cinebook.db.username}
spring.datasource.password=${cinebook.db.password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=false
spring.flyway.locations=classpath:db
spring.flyway.placeholders.projectRootPath=${cinebook.db.project-root-path}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.jpa.show-sql=false