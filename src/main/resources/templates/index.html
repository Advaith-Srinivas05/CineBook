<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBook - Movie Ticket Booking</title>
  <link rel="stylesheet" href="/css/styles.css" th:href="@{/css/styles.css}">
  <link rel="stylesheet" href="/css/index.css" th:href="@{/css/index.css}">
  <script src="/js/ui.js" th:src="@{/js/ui.js}"></script>
  <script src="/js/index.js" th:src="@{/js/index.js}"></script>
  <script src="/js/theme.js" th:src="@{/js/theme.js}"></script>
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-top">
      <div href="/" th:href="@{/}" class="logo"><img src="/images/title-nobg.png" alt="CineBook" class="logo-img"></div>
      <div class="search-bar">
        <input id="home-movie-search"
               type="text"
               placeholder="Search movies"
               autocomplete="off"
               th:attr="data-city=${selectedCity}">
        <div id="home-movie-suggestions" class="home-autocomplete-suggestions"></div>
      </div>
      <div class="header-right">
        <form class="location-selector" th:action="@{/}" action="/" method="get">
          <label for="city-select">📍</label>
          <select id="city-select" name="city" onchange="this.form.submit()">
            <option th:if="${#lists.isEmpty(cities)}" value="">No locations</option>
            <option th:each="cityName : ${cities}"
                    th:value="${cityName}"
                    th:text="${cityName}"
                    th:selected="${cityName == selectedCity}">
              Select Location
            </option>
          </select>
        </form>
        <th:block th:replace="~{fragments/header-user-controls :: userControls}"></th:block>
      </div>
    </div>
    <!-- <nav>
      <ul class="nav-links">
        <li><a href="/" th:href="@{/}">Movies</a></li>
        <li><a href="#stream">Stream</a></li>
        <li><a href="#events">Events</a></li>
        <li><a href="#plays">Plays</a></li>
        <li><a href="#sports">Sports</a></li>
        <li><a href="#activities">Activities</a></li>
        <li><a href="#buzz">Buzz</a></li>
      </ul>
    </nav> -->
  </header>

  <!-- Main Content -->
  <main>
    <!-- Hero Banner -->
    <!-- <section class="hero-banner">
      Discover Your Next Favorite Movie
    </section> -->
    <div class="carousel-container">
      <div class="carousel">
        <div class="slider" th:each="img : ${carouselImages}">
          <img th:src="@{/carousel/image/{id}(id=${img.id})}" th:alt="${img.imageName}" />
        </div>
      </div>
      <div th:if="${#lists.isEmpty(carouselImages)}">
        <p>No carousel images available.</p>
      </div>
    </div>

    <!-- Recommended Movies -->
    <section>
      <h1 class="section-title" th:text="${selectedCity != null ? 'Recommended Movies - ' + selectedCity : 'Recommended Movies'}">Recommended Movies</h1>
      <div id="movies-grid" th:if="${!#lists.isEmpty(movies)}">
        <form th:each="movie : ${movies}" th:action="@{/movie}" action="/movie" method="post" class="movie-card" th:attr="data-movie-id=${movie.id}">
          <input type="hidden" name="movieId" th:value="${movie.id}">
          <input type="hidden" name="city" th:value="${selectedCity}">
          <button type="submit" style="all: unset; display: block; width: 100%; cursor: pointer;">
            <img class="movie-poster" th:src="@{/movie/poster/{id}(id=${movie.id})}" th:alt="${movie.title + ' poster'}" />
            <div class="movie-info">
              <h2 class="movie-title" th:text="${movie.title}">Movie Title</h2>
              <p class="movie-genre" th:text="${movie.language != null ? movie.language : 'Language not available'}">Language</p>
              <p class="movie-rating" data-rating-label="true">⭐ --</p>
            </div>
          </button>
        </form>
      </div>
      <div th:if="${#lists.isEmpty(movies)}">
        <p>No movies available for the selected location.</p>
      </div>
    </section>
  </main>

  <th:block th:replace="~{fragments/auth-modal :: authModal}"></th:block>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 CineBook. All rights reserved.</p>
  </footer>
</body>
</html>
