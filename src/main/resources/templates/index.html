<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBook - Movie Ticket Booking</title>
  <link rel="stylesheet" href="/css/styles.css" th:href="@{/css/styles.css}">
  <script src="/js/ui.js" th:src="@{/js/ui.js}"></script>
  <script src="/js/theme.js" th:src="@{/js/theme.js}"></script>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-top">
      <a href="/" th:href="@{/}" class="logo">CineBook</a>
      <div class="search-bar">
        <input type="text" placeholder="Search for Movies, Events, Plays, Sports and Activities">
      </div>
      <div class="header-right">
        <form class="location-selector" th:action="@{/}" action="/" method="get">
          <label for="city-select">📍</label>
          <select id="city-select" name="city" onchange="this.form.submit()">
            <option th:if="${#lists.isEmpty(cities)}" value="">No locations</option>
            <option th:each="cityName : ${cities}"
                    th:value="${cityName}"
                    th:text="${cityName}"
                    th:selected="${cityName == selectedCity}">
              Select Location
            </option>
          </select>
        </form>
        <form th:if="${session.username != null}" th:action="@{/logout}" action="/logout" method="post" style="display:inline">
          <button type="submit" class="signin-btn">Logout</button>
        </form>
        <a th:if="${session.username == null}" href="/login" th:href="@{/login}" class="signin-btn">Sign In</a>
        <div class="menu-icon">☰</div>
      </div>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="/" th:href="@{/}">Movies</a></li>
        <li><a href="#stream">Stream</a></li>
        <li><a href="#events">Events</a></li>
        <li><a href="#plays">Plays</a></li>
        <li><a href="#sports">Sports</a></li>
        <li><a href="#activities">Activities</a></li>
        <li><a href="#buzz">Buzz</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <!-- Hero Banner -->
    <!-- <section class="hero-banner">
      Discover Your Next Favorite Movie
    </section> -->
    <div class="carousel-container">
      <div class="carousel">
        <div class="slider" th:each="img : ${carouselImages}">
          <img th:src="@{/carousel/image/{id}(id=${img.id})}" th:alt="${img.imageName}" />
        </div>
      </div>
      <div th:if="${#lists.isEmpty(carouselImages)}">
        <p>No carousel images available.</p>
      </div>
    </div>

    <!-- Recommended Movies -->
    <section>
      <h1 class="section-title" th:text="${selectedCity != null ? 'Recommended Movies - ' + selectedCity : 'Recommended Movies'}">Recommended Movies</h1>
      <div id="movies-grid" th:if="${!#lists.isEmpty(movies)}">
        <a th:each="movie : ${movies}" th:href="@{/movie(movieId=${movie.id})}" class="movie-card" th:attr="data-movie-id=${movie.id}">
          <img class="movie-poster" th:src="@{/movie/poster/{id}(id=${movie.id})}" th:alt="${movie.title + ' poster'}" />
          <div class="movie-info">
            <h2 class="movie-title" th:text="${movie.title}">Movie Title</h2>
            <p class="movie-genre" th:text="${movie.language != null ? movie.language : 'Language not available'}">Language</p>
            <p class="movie-rating">⭐ Rating coming soon</p>
          </div>
        </a>
      </div>
      <div th:if="${#lists.isEmpty(movies)}">
        <p>No movies available for the selected location.</p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 CineBook. All rights reserved.</p>
  </footer>
</body>
</html>
