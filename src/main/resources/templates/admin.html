<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - CineBook</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
  <script th:src="@{/js/ui.js}" src="/js/ui.js"></script>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-top">
      <a href="/" th:href="@{/}" class="logo">CineBook</a>
      <!-- <div class="search-bar">
        <input type="text" placeholder="Search for Movies, Events, Plays, Sports and Activities">
      </div> -->
      <h1 class="admin-title">Admin Dashboard</h1>
      <div class="header-right">
        <!-- <div class="location-selector">
          📍 Select Location
        </div> -->
        <form th:if="${session.username != null}" th:action="@{/logout}" action="/logout" method="post" style="display:inline">
          <button type="submit" class="signin-btn">Logout</button>
        </form>
        <a th:if="${session.username == null}" th:href="@{/login}" href="/login" class="signin-btn">Sign In</a>
        <div class="menu-icon">☰</div>
      </div>
    </div>
    <!-- <nav>
      <ul class="nav-links">
        <li><a href="/" th:href="@{/}">Movies</a></li>
        <li><a href="#stream">Stream</a></li>
        <li><a href="#events">Events</a></li>
        <li><a href="#plays">Plays</a></li>
        <li><a href="#sports">Sports</a></li>
        <li><a href="#activities">Activities</a></li>
        <li><a href="#buzz">Buzz</a></li>
      </ul>
    </nav> -->
  </header>

  <!-- Main Content -->
  <main>
    <section id="admin-container">
      <!-- <h1 class="admin-title">Admin Dashboard</h1> -->

      <div class="admin-row">
        <!-- Add Movie Section -->
        <div class="admin-card">
          <h2 class="admin-card-title">Add Movie</h2>
          <form id="add-movie-form" action="/admin/movies" method="post" enctype="multipart/form-data">
            <div class="form-group span-2">
              <label for="movie-title">Movie Title</label>
              <input type="text" id="movie-title" name="title" placeholder="Enter movie title" required>
              <div class="field-error" id="movie-title-error"></div>
            </div>
            <div class="form-group span-2">
              <label for="movie-language">Language</label>
              <input type="text" id="movie-language" name="language" placeholder="English, Hindi, etc." required>
              <div class="field-error" id="movie-language-error"></div>
            </div>
            <div class="form-group">
              <label for="movie-duration">Duration (minutes)</label>
              <input type="number" id="movie-duration" name="duration" placeholder="120" required>
              <div class="field-error" id="movie-duration-error"></div>
            </div>
            <div class="form-group">
              <label for="movie-poster">Movie Poster (jpg, jpeg, png)</label>
              <input type="file" id="movie-poster" name="poster" accept=".jpg,.jpeg,.png" required>
              <div class="field-error" id="movie-poster-error"></div>
            </div>
            <button type="submit" class="admin-btn">Add Movie</button>
          </form>
        </div>

        <!-- Add Theater Section -->
        <div class="admin-card">
          <h2 class="admin-card-title">Add Theater</h2>
          <form id="add-theater-form" action="/admin/theaters" method="post">
            <div class="form-group span-2">
              <label for="theater-name">Theater Name</label>
              <input type="text" id="theater-name" name="name" placeholder="Enter theater name" required>
              <div class="field-error" id="theater-name-error"></div>
            </div>
            <div class="form-group span-2">
              <label for="theater-location">Location</label>
              <input type="text" id="theater-location" name="location" placeholder="City / Address">
              <div class="field-error" id="theater-location-error"></div>
            </div>
            <div class="form-group span-2">
              <label for="screen-count">Screen Count</label>
              <input type="number" id="screen-count" name="screen_count" placeholder="5" value="1" min="1">
              <div class="field-error" id="screen-count-error"></div>
            </div>
            <button type="submit" class="admin-btn">Add Theater</button>
          </form>
        </div>
      </div>

      <!-- Schedule Show Section -->
      <div class="admin-card">
        <h2 class="admin-card-title">Schedule Show</h2>
        <form id="schedule-show-form" action="/admin/shows" method="post">
          <div class="form-group">
            <label for="show-movie-input">Movie</label>
            <input type="text" id="show-movie-input" placeholder="Type to search movies" autocomplete="off">
            <input type="hidden" id="show-movie-id" name="movie_id">
            <div class="autocomplete-suggestions" id="show-movie-suggestions" style="display:none"></div>
          </div>
          <div class="form-group">
            <label for="show-theater-input">Theater</label>
            <input type="text" id="show-theater-input" placeholder="Type to search theaters" autocomplete="off">
            <input type="hidden" id="show-theater-id" name="theater_id">
            <div class="autocomplete-suggestions" id="show-theater-suggestions" style="display:none"></div>
          </div>
          <div class="form-group">
            <label for="show-screen">Screen</label>
            <input type="number" id="show-screen" name="screen" placeholder="1" required>
          </div>
          <div class="form-group">
            <label for="show-start">Start Time</label>
            <input type="datetime-local" id="show-start" name="start_time" required>
          </div>
          <!-- End time is calculated automatically from movie duration -->
          <button type="submit" class="admin-btn">Schedule Show</button>
        </form>
      </div>

      <!-- Remove Movie Section -->
      <!-- <div class="admin-card">
        <h2 class="admin-card-title">Remove Movie</h2>
        <div class="movie-list">
          <div class="movie-item">
            <span class="movie-name">Movie 1</span>
            <button type="button" class="admin-remove-btn">Remove</button>
          </div>
          <div class="movie-item">
            <span class="movie-name">Movie 2</span>
            <button type="button" class="admin-remove-btn">Remove</button>
          </div>
          <div class="movie-item">
            <span class="movie-name">Movie 3</span>
            <button type="button" class="admin-remove-btn">Remove</button>
          </div>
        </div>
      </div> -->

      <!-- Manage Movies Section -->
      <div class="admin-card">
        <h2 class="admin-card-title">Manage Movies</h2>
        <div class="movies-table-wrapper">
          <table class="movies-table" id="admin-movies-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Movie Title</th>
                <th>Duration</th>
                <th>Language</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- rows populated by JS -->
            </tbody>
          </table>
        </div>

        <!-- Edit Modal -->
        <div id="edit-movie-modal" class="modal" style="display:none">
          <div class="modal-content">
            <span class="close-modal" id="close-edit-modal">&times;</span>
            <h3>Edit Movie</h3>
            <form id="edit-movie-form" enctype="multipart/form-data">
              <input type="hidden" id="edit-movie-id" name="id">
              <div class="form-group">
                <label for="edit-title">Movie Title</label>
                <input type="text" id="edit-title" name="title" required>
              </div>
              <div class="form-group">
                <label for="edit-duration">Duration (minutes)</label>
                <input type="number" id="edit-duration" name="duration" required>
              </div>
              <div class="form-group">
                <label for="edit-language">Language</label>
                <input type="text" id="edit-language" name="language">
              </div>
              <div class="form-group">
                <label for="edit-poster">Poster (leave empty to keep existing)</label>
                <input type="file" id="edit-poster" name="poster" accept=".jpg,.jpeg,.png">
              </div>
              <div style="margin-top:12px">
                <button type="submit" class="admin-btn">Save changes</button>
                <button type="button" id="cancel-edit" class="admin-btn">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Manage Shows Section -->
      <div class="admin-card">
        <h2 class="admin-card-title">Manage Shows</h2>
        <form id="manage-shows-filter" class="inline-form" onsubmit="return false;">
          <div class="form-group">
            <label for="manage-show-theater-input">Theater</label>
            <input type="text" id="manage-show-theater-input" placeholder="Type to search theaters" autocomplete="off">
            <input type="hidden" id="manage-show-theater-id" name="theater_id">
            <div class="autocomplete-suggestions" id="manage-show-theater-suggestions" style="display:none"></div>
          </div>
          <div class="form-group">
            <label for="manage-show-date">Date</label>
            <input type="date" id="manage-show-date" name="date">
          </div>
        </form>
        <div class="shows-table-wrapper">
          <table class="shows-table">
            <thead>
              <tr>
                <th>Movie</th>
                <th>Theater</th>
                <th>Screen</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 CineBook. All rights reserved.</p>
  </footer>
  <script>
    (function(){
      async function fetchMovies(){
        const res = await fetch('/api/admin/movies');
        if (!res.ok) return;
        const list = await res.json();
        const tbody = document.querySelector('#admin-movies-table tbody');
        tbody.innerHTML = '';
        for (const m of list){
          const tr = document.createElement('tr');
          const status = (m.status||'').toString();
          const statusClass = status.toLowerCase();
          tr.innerHTML = `<td>${escapeHtml(m.id)}</td><td>${escapeHtml(m.title)}</td><td>${escapeHtml(formatDuration(m.duration))}</td><td>${escapeHtml(m.language||'')}</td><td><span class="status-badge ${statusClass}">${escapeHtml(status)}</span></td><td><button class="edit-btn" data-id="${m.id}">Edit</button> <button class="delete-btn" data-id="${m.id}">Delete</button></td>`;
          tbody.appendChild(tr);
        }
        attachButtons();
      }

      function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>\"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

      function formatDuration(minutes){
        if (minutes == null || minutes === '') return '';
        const mins = Number(minutes);
        if (Number.isNaN(mins) || mins < 0) return '';
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        if (h > 0 && m > 0) return `${h}h ${m}m`;
        if (h > 0) return `${h}h`;
        return `${m}m`;
      }

      function attachButtons(){
        document.querySelectorAll('.edit-btn').forEach(b=>b.onclick = onEdit);
        document.querySelectorAll('.delete-btn').forEach(b=>b.onclick = onDelete);
      }

      async function onEdit(e){
        const id = e.target.dataset.id;
        // fetch movie details from admin list endpoint (we already have data in table, but get fresh)
        const res = await fetch('/api/admin/movies');
        if (!res.ok) return; const list = await res.json();
        const m = list.find(x=>String(x.id)===String(id));
        if (!m) return alert('Movie not found');
        document.getElementById('edit-movie-id').value = m.id;
        document.getElementById('edit-title').value = m.title || '';
        document.getElementById('edit-duration').value = m.duration || '';
        document.getElementById('edit-language').value = m.language || '';
        document.getElementById('edit-poster').value = '';
        showModal();
      }

      async function onDelete(e){
        if (!confirm('Delete this movie? This will remove it and related shows/ratings.')) return;
        const id = e.target.dataset.id;
        const res = await fetch(`/admin/movies/${id}/delete`, {method:'POST'});
        if (res.ok){ fetchMovies(); } else { alert('Failed to delete'); }
      }

      function showModal(){ document.getElementById('edit-movie-modal').style.display='block'; }
      function hideModal(){ document.getElementById('edit-movie-modal').style.display='none'; }

      document.getElementById('close-edit-modal').onclick = hideModal;
      document.getElementById('cancel-edit').onclick = hideModal;

      document.getElementById('edit-movie-form').addEventListener('submit', async function(evt){
        evt.preventDefault();
        const id = document.getElementById('edit-movie-id').value;
        const form = new FormData();
        form.append('title', document.getElementById('edit-title').value);
        form.append('duration', document.getElementById('edit-duration').value);
        form.append('language', document.getElementById('edit-language').value);
        const file = document.getElementById('edit-poster').files[0];
        if (file) form.append('poster', file);
        const res = await fetch(`/admin/movies/${id}/update`, {method:'POST', body: form});
        if (res.ok){ hideModal(); fetchMovies(); } else { alert('Failed to save changes'); }
      });

      // initial load
      fetchMovies();

      // Manage shows: theater autocomplete + filtering (uses /api/theaters/search)
      function showSuggestions(container, items, onItemClick){
        container.innerHTML = '';
        if (!items || items.length === 0){ container.style.display = 'none'; return; }
        for (const t of items){
          const div = document.createElement('div');
          div.className = 'autocomplete-item';
          div.textContent = t.name || t.theaterName || t.title || '';
          div.dataset.id = t.id;
          div.dataset.name = div.textContent;
          div.onclick = () => {
            selectManageTheater(div.dataset.id, div.dataset.name);
          };
          container.appendChild(div);
        }
        container.style.display = 'block';
      }

      function selectManageTheater(id, name){
        document.getElementById('manage-show-theater-id').value = id;
        document.getElementById('manage-show-theater-input').value = name;
        document.getElementById('manage-show-theater-suggestions').style.display = 'none';
        // automatically load shows when a theater is selected and a date is chosen
        const date = document.getElementById('manage-show-date').value;
        if (date) loadShowsForFilter();
      }

      document.getElementById('manage-show-theater-input').addEventListener('input', async function(){
        const q = this.value.trim();
        const container = document.getElementById('manage-show-theater-suggestions');
        if (!q){ container.style.display = 'none'; document.getElementById('manage-show-theater-id').value = ''; return; }
        try {
          const res = await fetch('/api/theaters/search?q=' + encodeURIComponent(q));
          if (!res.ok) { container.style.display = 'none'; return; }
          const list = await res.json();
          showSuggestions(container, list.slice(0,20), (div)=> selectManageTheater(div.dataset.id, div.dataset.name));
        } catch(e){ container.style.display = 'none'; }
      });

      document.getElementById('manage-show-theater-input').addEventListener('blur', function(){
        setTimeout(()=>{ document.getElementById('manage-show-theater-suggestions').style.display='none'; }, 200);
      });

      // Schedule Show: Movie autocomplete
      document.getElementById('show-movie-input').addEventListener('input', async function(){
        const q = this.value.trim();
        const container = document.getElementById('show-movie-suggestions');
        if (!q){ container.style.display = 'none'; document.getElementById('show-movie-id').value = ''; return; }
        try {
          const res = await fetch('/api/movies/search?q=' + encodeURIComponent(q));
          if (!res.ok) { container.style.display = 'none'; return; }
          const list = await res.json();
          showSuggestions(container, list.slice(0,20), (div)=>{
            document.getElementById('show-movie-id').value = div.dataset.id;
            document.getElementById('show-movie-input').value = div.dataset.name;
            container.style.display = 'none';
          });
        } catch(e){ container.style.display = 'none'; }
      });

      document.getElementById('show-movie-input').addEventListener('blur', function(){
        setTimeout(()=>{ document.getElementById('show-movie-suggestions').style.display='none'; }, 200);
      });

      // Schedule Show: Theater autocomplete
      document.getElementById('show-theater-input').addEventListener('input', async function(){
        const q = this.value.trim();
        const container = document.getElementById('show-theater-suggestions');
        if (!q){ container.style.display = 'none'; document.getElementById('show-theater-id').value = ''; return; }
        try {
          const res = await fetch('/api/theaters/search?q=' + encodeURIComponent(q));
          if (!res.ok) { container.style.display = 'none'; return; }
          const list = await res.json();
          showSuggestions(container, list.slice(0,20), (div)=>{
            document.getElementById('show-theater-id').value = div.dataset.id;
            document.getElementById('show-theater-input').value = div.dataset.name;
            container.style.display = 'none';
          });
        } catch(e){ container.style.display = 'none'; }
      });

      document.getElementById('show-theater-input').addEventListener('blur', function(){
        setTimeout(()=>{ document.getElementById('show-theater-suggestions').style.display='none'; }, 200);
      });

      // Schedule Show: validate before submit
      document.getElementById('schedule-show-form').addEventListener('submit', function(evt){
        const movieId = document.getElementById('show-movie-id').value;
        const theaterId = document.getElementById('show-theater-id').value;
        if (!movieId){ evt.preventDefault(); alert('Please select a movie from the suggestions.'); return false; }
        if (!theaterId){ evt.preventDefault(); alert('Please select a theater from the suggestions.'); return false; }
        return true;
      });

      // when date changes, load shows if a theater is already selected
      document.getElementById('manage-show-date').addEventListener('change', function(){
        const theaterId = document.getElementById('manage-show-theater-id').value;
        if (theaterId && this.value) loadShowsForFilter();
      });

      async function loadShowsForFilter(){
        const theaterId = document.getElementById('manage-show-theater-id').value;
        const date = document.getElementById('manage-show-date').value;
        const tbody = document.querySelector('.shows-table tbody');
        tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';
        if (!theaterId){ tbody.innerHTML = '<tr><td colspan="6">Please select a theater.</td></tr>'; return; }
        try {
          const url = `/api/admin/shows?theater_id=${encodeURIComponent(theaterId)}${date?('&date='+encodeURIComponent(date)):''}`;
          const res = await fetch(url);
          if (!res.ok){ tbody.innerHTML = '<tr><td colspan="6">Failed to load shows.</td></tr>'; return; }
          const list = await res.json();
          if (!Array.isArray(list) || list.length===0){ tbody.innerHTML = '<tr><td colspan="6">No shows found for selected theater/date.</td></tr>'; return; }
          tbody.innerHTML = '';
          function formatDateTime(v){
            if (!v) return '';
            try {
              const d = new Date(String(v));
              if (Number.isNaN(d.getTime())) return String(v);
              const pad = (n) => String(n).padStart(2, '0');
              const dd = pad(d.getDate());
              const mm = pad(d.getMonth() + 1);
              const yy = pad(d.getFullYear() % 100);
              const hh = pad(d.getHours());
              const min = pad(d.getMinutes());
              return `${dd}/${mm}/${yy} ${hh}:${min}`;
            } catch(e){ return String(v); }
          }

          for (const s of list){
            const tr = document.createElement('tr');
            const movie = escapeHtml(s.movieTitle || (s.movie && s.movie.title) || '');
            const theater = escapeHtml(s.theaterName || (s.theater && s.theater.name) || '');
            const screen = escapeHtml(s.screen || s.screen_number || '');
            const rawStart = s.startTime || s.start_time || s.start || '';
            const rawEnd = s.endTime || s.end_time || s.end || '';
            const start = escapeHtml(formatDateTime(rawStart));
            const end = escapeHtml(formatDateTime(rawEnd));
            const id = s.id || s.showId || '';
            tr.innerHTML = `<td>${movie}</td><td>${theater}</td><td>${screen}</td><td>${start}</td><td>${end}</td><td><button class="admin-action-btn edit" data-id="${id}">Edit</button> <button class="admin-action-btn delete" data-id="${id}">Delete</button></td>`;
            tbody.appendChild(tr);
          }
          document.querySelectorAll('.shows-table .admin-action-btn.edit').forEach(b=>b.onclick = function(){ alert('Implement edit for show '+this.dataset.id); });
          document.querySelectorAll('.shows-table .admin-action-btn.delete').forEach(b=>b.onclick = async function(){ if(!confirm('Delete this show?')) return; const id=this.dataset.id; const res=await fetch(`/admin/shows/${id}/delete`,{method:'POST'}); if(res.ok) loadShowsForFilter(); else alert('Failed to delete'); });
        } catch(e){ tbody.innerHTML = '<tr><td colspan="6">Error loading shows.</td></tr>'; }
      }

    })();
  </script>
</body>
</html>
