<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - CineBook</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
  <script th:src="@{/js/ui.js}" src="/js/ui.js"></script>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-top">
      <a href="/" th:href="@{/}" class="logo">CineBook</a>
      <!-- <div class="search-bar">
        <input type="text" placeholder="Search for Movies, Events, Plays, Sports and Activities">
      </div> -->
      <h1 class="admin-title">Admin Dashboard</h1>
      <div class="header-right">
        <!-- <div class="location-selector">
          📍 Select Location
        </div> -->
        <form th:if="${session.username != null}" th:action="@{/logout}" action="/logout" method="post" style="display:inline">
          <button type="submit" class="signin-btn">Logout</button>
        </form>
        <a th:if="${session.username == null}" th:href="@{/login}" href="/login" class="signin-btn">Sign In</a>
        <div class="menu-icon">☰</div>

    </div>

      <ul class="nav-links">
        <li><a href="/" th:href="@{/}">Movies</a></li>
        <li><a href="#stream">Stream</a></li>
        <li><a href="#events">Events</a></li>

        <li><a href="#buzz">Buzz</a></li>
      </ul>
    </nav> -->
  </header>

  <!-- Main Content -->
  <main>
    <section id="admin-container">
      <!-- <h1 class="admin-title">Admin Dashboard</h1> -->

      <div class="admin-row">
        <!-- Add Movie Section -->
        <div class="admin-card">
          <div class="admin-card-title section-header" role="button" tabindex="0" aria-expanded="true">
            <span>Add Movie</span>
            <span class="toggle-icon" aria-hidden="true">^</span>
          </div>
          <div class="section-content">
            <form id="add-movie-form" action="/admin/movies" method="post" enctype="multipart/form-data">
              <div class="form-group span-2">
                <label for="movie-title">Movie Title</label>
                <input type="text" id="movie-title" name="title" placeholder="Enter movie title" required>
                <div class="field-error" id="movie-title-error"></div>
              </div>
              <div class="form-group span-2">
                <label for="movie-language">Language</label>
                <input type="text" id="movie-language" name="language" placeholder="English, Hindi, etc." required>
                <div class="field-error" id="movie-language-error"></div>
              </div>
              <div class="form-group">
                <label for="movie-duration">Duration (minutes)</label>
                <input type="number" id="movie-duration" name="duration" placeholder="120" required>
                <div class="field-error" id="movie-duration-error"></div>
              </div>
              <div class="form-group">
                <label for="movie-poster">Movie Poster (jpg, jpeg, png)</label>
                <input type="file" id="movie-poster" name="poster" accept=".jpg,.jpeg,.png" required>
                <div class="field-error" id="movie-poster-error"></div>
              </div>
              <button type="submit" class="admin-btn">Add Movie</button>
            </form>
          </div>
        </div>

        <!-- Add Theater Section -->
        <div class="admin-card">
          <div class="admin-card-title section-header" role="button" tabindex="0" aria-expanded="true">
            <span>Add Theater</span>
            <span class="toggle-icon" aria-hidden="true">^</span>
          </div>
          <div class="section-content">
            <form id="add-theater-form" action="/admin/theaters" method="post">
              <div class="form-group span-2">
                <label for="theater-name">Theater Name</label>
                <input type="text" id="theater-name" name="name" placeholder="Enter theater name" required>
                <div class="field-error" id="theater-name-error"></div>
              </div>
              <div class="form-group span-2">
                <label for="theater-location">Location</label>
                <input type="text" id="theater-location" name="location" placeholder="City / Address">
                <div class="field-error" id="theater-location-error"></div>
              </div>
              <div class="form-group span-2">
                <label for="screen-count">Screen Count</label>
                <input type="number" id="screen-count" name="screen_count" placeholder="5" value="1" min="1">
                <div class="field-error" id="screen-count-error"></div>
              </div>
              <button type="submit" class="admin-btn">Add Theater</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Schedule Show Section -->
      <div class="admin-card">
        <div class="admin-card-title section-header" role="button" tabindex="0" aria-expanded="true">
          <span>Schedule Show</span>
          <span class="toggle-icon" aria-hidden="true">^</span>
        </div>
        <div class="section-content">
          <form id="schedule-show-form" action="/admin/shows" method="post">
            <div class="admin-row">
              <div class="form-group">
                <label for="show-movie-input">Select Movie</label>
                <input type="text" id="show-movie-input" placeholder="Type to search movies" autocomplete="off">
                <input type="hidden" id="show-movie-id" name="movie_id">
                <div class="autocomplete-suggestions" id="show-movie-suggestions" style="display:none"></div>
              </div>
              <div class="form-group">
                <label for="show-theater-input">Select Theatre</label>
                <input type="text" id="show-theater-input" placeholder="Type to search theatres" autocomplete="off">
                <input type="hidden" id="show-theater-id" name="theater_id">
                <div class="autocomplete-suggestions" id="show-theater-suggestions" style="display:none"></div>
              </div>
            </div>

            <div class="admin-row">
              <div class="form-group">
                <label for="show-start-date">Start Date</label>
                <input type="date" id="show-start-date" name="start_date" required>
              </div>
              <div class="form-group">
                <label for="show-end-date">End Date</label>
                <input type="date" id="show-end-date" name="end_date" required>
              </div>
            </div>

            <div id="timeslot-rows"></div>
            
            <div id="schedule-button">
              <div class="schedule-show-button">
                <button type="button" class="admin-btn" id="add-timeslot-btn">+ Add Timeslot</button>
                <button type="submit" class="admin-btn">Schedule Show</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Remove Movie Section -->
      <!-- <div class="admin-card">
        <h2 class="admin-card-title">Remove Movie</h2>
        <div class="movie-list">
          <div class="movie-item">
            <span class="movie-name">Movie 1</span>
            <button type="button" class="admin-remove-btn">Remove</button>
          </div>
          <div class="movie-item">
            <span class="movie-name">Movie 2</span>
            <button type="button" class="admin-remove-btn">Remove</button>
          </div>
          <div class="movie-item">
            <span class="movie-name">Movie 3</span>
            <button type="button" class="admin-remove-btn">Remove</button>
          </div>
        </div>
      </div> -->

      <!-- Manage Movies Section -->
      <div class="admin-card">
        <div class="admin-card-title section-header" role="button" tabindex="0" aria-expanded="true">
          <span>Manage Movies</span>
          <span class="toggle-icon" aria-hidden="true">^</span>
        </div>
        <div class="section-content">
          <div class="movies-table-wrapper">
            <table class="movies-table" id="admin-movies-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Movie Title</th>
                  <th>Duration</th>
                  <th>Language</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- rows populated by JS -->
              </tbody>
            </table>
          </div>

          <!-- Edit Modal -->
          <div id="edit-movie-modal" class="modal" style="display:none">
            <div class="modal-content">
              <span class="close-modal" id="close-edit-modal">&times;</span>
              <h3>Edit Movie</h3>
              <form id="edit-movie-form" enctype="multipart/form-data">
                <input type="hidden" id="edit-movie-id" name="id">
                <div class="form-group">
                  <label for="edit-title">Movie Title</label>
                  <input type="text" id="edit-title" name="title" required>
                </div>
                <div class="form-group">
                  <label for="edit-duration">Duration (minutes)</label>
                  <input type="number" id="edit-duration" name="duration" required>
                </div>
                <div class="form-group">
                  <label for="edit-language">Language</label>
                  <input type="text" id="edit-language" name="language">
                </div>
                <div class="form-group">
                  <label for="edit-poster">Poster (leave empty to keep existing)</label>
                  <input type="file" id="edit-poster" name="poster" accept=".jpg,.jpeg,.png">
                </div>
                <div style="margin-top:12px">
                  <button type="submit" class="admin-btn">Save changes</button>
                  <button type="button" id="cancel-edit" class="admin-btn">Cancel</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Manage Shows Section -->
      <div class="admin-card">
        <div class="admin-card-title section-header" role="button" tabindex="0" aria-expanded="true">
          <span>Manage Shows</span>
          <span class="toggle-icon" aria-hidden="true">^</span>
        </div>
        <div class="section-content">
          <form id="manage-shows-filter" class="inline-form" onsubmit="return false;">
            <div class="form-group">
              <label for="manage-show-theater-input">Theater</label>
              <input type="text" id="manage-show-theater-input" placeholder="Type to search theaters" autocomplete="off">
              <input type="hidden" id="manage-show-theater-id" name="theater_id">
              <input type="hidden" id="manage-show-theater-screen-count" value="">
              <div class="autocomplete-suggestions" id="manage-show-theater-suggestions" style="display:none"></div>
            </div>
            <div class="form-group">
              <label for="manage-show-movie-input">Movie</label>
              <input type="text" id="manage-show-movie-input" placeholder="Type to search movies" autocomplete="off">
              <input type="hidden" id="manage-show-movie-id" name="movie_id">
              <div class="autocomplete-suggestions" id="manage-show-movie-suggestions" style="display:none"></div>
            </div>
          </form>
          <div class="shows-table-wrapper">
            <table class="shows-table">
              <thead>
                <tr>
                  <th>Movie</th>
                  <th>Start Time</th>
                  <th>Start Date</th>
                  <th>End Date</th>
                  <th>Screen</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
              </tbody>
            </table>
          </div>

          <div id="edit-show-modal" class="modal" style="display:none">
            <div class="modal-content">
              <span class="close-modal" id="close-edit-show-modal">&times;</span>
              <h3>Edit Show</h3>
              <form id="edit-show-form">
                <input type="hidden" id="edit-show-id" name="id">
                <div class="form-group">
                  <label for="edit-show-start-date">Start Date</label>
                  <input type="date" id="edit-show-start-date" name="start_date" required>
                </div>
                <div class="form-group">
                  <label for="edit-show-end-date">End Date</label>
                  <input type="date" id="edit-show-end-date" name="end_date" required>
                </div>
                <div class="form-group">
                  <label for="edit-show-screen">Screen</label>
                  <input type="number" id="edit-show-screen" name="screen" min="1" required>
                </div>
                <div style="margin-top:12px">
                  <button type="submit" class="admin-btn">Save changes</button>
                  <button type="button" id="cancel-edit-show" class="admin-btn">Cancel</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 CineBook. All rights reserved.</p>
  </footer>
  <script>
    (function(){
      function escapeHtml(s){
        if (!s && s !== 0) return '';
        return String(s).replace(/[&<>\"']/g, function(c){
          return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
        });
      }

      function formatDuration(minutes){
        if (minutes == null || minutes === '') return '';
        const mins = Number(minutes);
        if (Number.isNaN(mins) || mins < 0) return '';
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        if (h > 0 && m > 0) return `${h}h ${m}m`;
        if (h > 0) return `${h}h`;
        return `${m}m`;
      }

      function formatDateTime(v){
        if (!v) return '';
        try {
          const d = new Date(String(v));
          if (Number.isNaN(d.getTime())) {
            const raw = String(v).trim();
            const m = raw.match(/(\d{2}):(\d{2})/);
            return m ? `${m[1]}:${m[2]}` : raw;
          }
          const pad = (n) => String(n).padStart(2, '0');
          return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
        } catch (e) {
          const raw = String(v).trim();
          const m = raw.match(/(\d{2}):(\d{2})/);
          return m ? `${m[1]}:${m[2]}` : raw;
        }
      }

      function showSuggestions(container, items, labelSelector, onSelect){
        container.innerHTML = '';
        if (!items || items.length === 0) {
          container.style.display = 'none';
          return;
        }
        for (const item of items) {
          const div = document.createElement('div');
          div.className = 'autocomplete-item';
          const label = labelSelector(item) || '';
          div.textContent = label;
          div.dataset.id = item.id;
          div.dataset.label = label;
          div.onclick = () => onSelect(item, div);
          container.appendChild(div);
        }
        container.style.display = 'block';
      }

      async function fetchMovies(){
        const tbody = document.querySelector('#admin-movies-table tbody');
        tbody.innerHTML = '<tr><td colspan="6">Loading movies...</td></tr>';
        try {
          const res = await fetch('/api/admin/movies');
          if (!res.ok) {
            tbody.innerHTML = '<tr><td colspan="6">Failed to load movies.</td></tr>';
            return;
          }

          const list = await res.json();
          if (!Array.isArray(list) || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">No movies found.</td></tr>';
            return;
          }

          tbody.innerHTML = '';
          for (const m of list){
            const tr = document.createElement('tr');
            const status = (m.status || '').toString();
            tr.innerHTML = `<td>${escapeHtml(m.id)}</td><td>${escapeHtml(m.title)}</td><td>${escapeHtml(formatDuration(m.duration))}</td><td>${escapeHtml(m.language || '')}</td><td><span class="status-badge ${escapeHtml(status.toLowerCase())}">${escapeHtml(status)}</span></td><td><button class="edit-btn" data-id="${m.id}">Edit</button> <button class="delete-btn" data-id="${m.id}">Delete</button></td>`;
            tbody.appendChild(tr);
          }
        } catch (e) {
          tbody.innerHTML = '<tr><td colspan="6">Error loading movies.</td></tr>';
        }

        document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = onEditMovie);
        document.querySelectorAll('.delete-btn').forEach(btn => btn.onclick = onDeleteMovie);
      }

      async function onEditMovie(e){
        const id = e.target.dataset.id;
        const res = await fetch('/api/admin/movies');
        if (!res.ok) return alert('Failed to load movie details');
        const list = await res.json();
        const m = list.find(x => String(x.id) === String(id));
        if (!m) return alert('Movie not found');
        document.getElementById('edit-movie-id').value = m.id;
        document.getElementById('edit-title').value = m.title || '';
        document.getElementById('edit-duration').value = m.duration || '';
        document.getElementById('edit-language').value = m.language || '';
        document.getElementById('edit-poster').value = '';
        document.getElementById('edit-movie-modal').style.display = 'block';
      }

      async function onDeleteMovie(e){
        if (!confirm('Delete this movie? This will remove related schedules and ratings.')) return;
        const id = e.target.dataset.id;
        const res = await fetch(`/admin/movies/${id}/delete`, { method: 'POST' });
        if (res.ok) fetchMovies();
        else alert('Failed to delete movie');
      }

      const editModal = document.getElementById('edit-movie-modal');
      document.getElementById('close-edit-modal').onclick = () => { editModal.style.display = 'none'; };
      document.getElementById('cancel-edit').onclick = () => { editModal.style.display = 'none'; };

      const editShowModal = document.getElementById('edit-show-modal');
      document.getElementById('close-edit-show-modal').onclick = () => { editShowModal.style.display = 'none'; };
      document.getElementById('cancel-edit-show').onclick = () => { editShowModal.style.display = 'none'; };

      document.getElementById('edit-movie-form').addEventListener('submit', async function(evt){
        evt.preventDefault();
        const id = document.getElementById('edit-movie-id').value;
        const form = new FormData();
        form.append('title', document.getElementById('edit-title').value);
        form.append('duration', document.getElementById('edit-duration').value);
        form.append('language', document.getElementById('edit-language').value);
        const file = document.getElementById('edit-poster').files[0];
        if (file) form.append('poster', file);
        const res = await fetch(`/admin/movies/${id}/update`, { method: 'POST', body: form });
        if (res.ok) {
          editModal.style.display = 'none';
          fetchMovies();
        } else {
          alert('Failed to save changes');
        }
      });

      const timeslotRows = document.getElementById('timeslot-rows');
      const addTimeslotBtn = document.getElementById('add-timeslot-btn');
      function addTimeslotRow(defaultTime, defaultScreen){
        const row = document.createElement('div');
        row.className = 'timeslot-row';
       row.innerHTML =
        `<div class="admin-row">
            <div class="form-group">
              <label>Timeslot</label>
              <input type="time" name="timeslot_time" value="${escapeHtml(defaultTime || '')}" required>
            </div>

            <div class="form-group">
              <label>Select Screen for timeslot</label>
              <input type="number" name="timeslot_screen" value="${escapeHtml(defaultScreen || '1')}" min="1" required>
            </div>
        </div>` +

        `<div class="admin-row">
            <div class="form-group">
              <label style="visibility:hidden;" aria-hidden="true">Remove Timeslot</label>
              <button type="button" class="admin-btn remove-timeslot-btn">
                Remove
              </button>
            </div>
        </div>`;
        row.querySelector('.remove-timeslot-btn').onclick = function(){
          row.remove();
          if (timeslotRows.children.length === 0) addTimeslotRow('', '1');
        };
        timeslotRows.appendChild(row);
      }

      addTimeslotBtn.addEventListener('click', function(){ addTimeslotRow('', '1'); });
      addTimeslotRow('', '1');

      async function bindAutocomplete(inputId, hiddenId, suggestionsId, endpoint, labelSelector, afterSelect){
        const input = document.getElementById(inputId);
        const hidden = document.getElementById(hiddenId);
        const container = document.getElementById(suggestionsId);

        input.addEventListener('input', async function(){
          const q = this.value.trim();
          hidden.value = '';
          if (!q) {
            container.style.display = 'none';
            return;
          }
          try {
            const res = await fetch(endpoint + encodeURIComponent(q));
            if (!res.ok) {
              container.style.display = 'none';
              return;
            }
            const list = await res.json();
            showSuggestions(container, list.slice(0, 20), labelSelector, (item) => {
              hidden.value = item.id;
              input.value = labelSelector(item);
              container.style.display = 'none';
              if (afterSelect) afterSelect(item);
            });
          } catch (e) {
            container.style.display = 'none';
          }
        });

        input.addEventListener('blur', function(){
          setTimeout(() => { container.style.display = 'none'; }, 200);
        });
      }

      bindAutocomplete('show-movie-input', 'show-movie-id', 'show-movie-suggestions', '/api/movies/search?q=', (x) => x.title || '');
      bindAutocomplete('show-theater-input', 'show-theater-id', 'show-theater-suggestions', '/api/theaters/search?q=', (x) => x.name || '', (selected) => {
        const count = Number(selected.screenCount || 0);
        if (count > 0) {
          document.querySelectorAll('input[name="timeslot_screen"]').forEach(inp => {
            inp.max = String(count);
          });
        }
      });
      bindAutocomplete('manage-show-theater-input', 'manage-show-theater-id', 'manage-show-theater-suggestions', '/api/theaters/search?q=', (x) => x.name || '', (selected) => {
        document.getElementById('manage-show-theater-screen-count').value = selected && selected.screenCount ? String(selected.screenCount) : '';
        maybeLoadShowsForFilter();
      });
      bindAutocomplete('manage-show-movie-input', 'manage-show-movie-id', 'manage-show-movie-suggestions', '/api/movies/search?q=', (x) => x.title || '', () => {
        maybeLoadShowsForFilter();
      });

      function maybeLoadShowsForFilter(){
        const theaterId = document.getElementById('manage-show-theater-id').value;
        const movieId = document.getElementById('manage-show-movie-id').value;
        if (theaterId && movieId) {
          loadShowsForFilter();
        }
      }

      document.getElementById('manage-show-theater-input').addEventListener('input', function(){
        if (this.value.trim()) return;
        document.getElementById('manage-show-theater-id').value = '';
        document.getElementById('manage-show-theater-screen-count').value = '';
        document.querySelector('.shows-table tbody').innerHTML = '<tr><td colspan="6">Select theatre and movie to view shows.</td></tr>';
      });

      document.getElementById('manage-show-movie-input').addEventListener('input', function(){
        if (this.value.trim()) return;
        document.getElementById('manage-show-movie-id').value = '';
        document.querySelector('.shows-table tbody').innerHTML = '<tr><td colspan="6">Select theatre and movie to view shows.</td></tr>';
      });

      document.getElementById('schedule-show-form').addEventListener('submit', async function(evt){
        evt.preventDefault();

        const movieId = document.getElementById('show-movie-id').value;
        const theaterId = document.getElementById('show-theater-id').value;
        const startDate = document.getElementById('show-start-date').value;
        const endDate = document.getElementById('show-end-date').value;
        if (!movieId) return alert('Please select a movie from suggestions.');
        if (!theaterId) return alert('Please select a theatre from suggestions.');
        if (!startDate || !endDate) return alert('Please choose both start and end dates.');

        const rows = Array.from(document.querySelectorAll('#timeslot-rows .timeslot-row'));
        if (rows.length === 0) return alert('Add at least one timeslot.');

        for (const row of rows) {
          const timeEl = row.querySelector('input[name="timeslot_time"]');
          const screenEl = row.querySelector('input[name="timeslot_screen"]');
          if (!timeEl.value) return alert('Each timeslot needs a start time.');
          const screen = Number(screenEl.value);
          if (!screen || screen < 1) return alert('Each timeslot needs a valid screen.');
        }

        const encodedBody = new URLSearchParams(new FormData(this));
        const res = await fetch('/admin/shows', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: encodedBody
        });
        if (res.ok) {
          alert('Schedule saved successfully.');
          this.reset();
          timeslotRows.innerHTML = '';
          addTimeslotRow('', '1');
          const selectedTheater = document.getElementById('manage-show-theater-id').value;
          const selectedMovie = document.getElementById('manage-show-movie-id').value;
          if (selectedTheater === theaterId && selectedMovie === movieId) loadShowsForFilter();
          return;
        }

        const message = await res.text();
        alert(message || 'Failed to schedule shows.');
      });

      async function loadShowsForFilter(){
        const theaterId = document.getElementById('manage-show-theater-id').value;
        const movieId = document.getElementById('manage-show-movie-id').value;
        const tbody = document.querySelector('.shows-table tbody');
        if (!theaterId || !movieId) {
          tbody.innerHTML = '<tr><td colspan="6">Select theatre and movie to view shows.</td></tr>';
          return;
        }

        tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';
        try {
          const url = `/api/admin/shows?theater_id=${encodeURIComponent(theaterId)}&movie_id=${encodeURIComponent(movieId)}`;
          const res = await fetch(url);
          if (!res.ok) {
            tbody.innerHTML = '<tr><td colspan="6">Failed to load shows.</td></tr>';
            return;
          }
          const list = await res.json();
          if (!Array.isArray(list) || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">No shows found for selected theatre/movie.</td></tr>';
            return;
          }

          tbody.innerHTML = '';
          for (const s of list) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${escapeHtml(s.movieTitle || '')}</td><td>${escapeHtml(formatDateTime(s.startTime))}</td><td>${escapeHtml(s.startDate || '')}</td><td>${escapeHtml(s.endDate || '')}</td><td>${escapeHtml(s.screen || '')}</td><td><button class="admin-action-btn edit" data-id="${escapeHtml(s.id || '')}" data-start-date="${escapeHtml(s.startDate || '')}" data-end-date="${escapeHtml(s.endDate || '')}" data-screen="${escapeHtml(s.screen || '')}">Edit</button> <button class="admin-action-btn delete" data-id="${escapeHtml(s.id || '')}">Delete</button></td>`;
            tbody.appendChild(tr);
          }

          document.querySelectorAll('.shows-table .admin-action-btn.edit').forEach(btn => {
            btn.onclick = function(){
              document.getElementById('edit-show-id').value = this.dataset.id || '';
              document.getElementById('edit-show-start-date').value = this.dataset.startDate || '';
              document.getElementById('edit-show-end-date').value = this.dataset.endDate || '';
              document.getElementById('edit-show-screen').value = this.dataset.screen || '1';
              const screenCount = Number(document.getElementById('manage-show-theater-screen-count').value || 0);
              const screenInput = document.getElementById('edit-show-screen');
              if (screenCount > 0) {
                screenInput.max = String(screenCount);
              } else {
                screenInput.removeAttribute('max');
              }
              editShowModal.style.display = 'block';
            };
          });

          document.querySelectorAll('.shows-table .admin-action-btn.delete').forEach(btn => {
            btn.onclick = async function(){
              if (!confirm('Delete this scheduled slot?')) return;
              const id = this.dataset.id;
              const res = await fetch(`/admin/shows/${id}/delete`, { method: 'POST' });
              if (res.ok) loadShowsForFilter();
              else alert('Failed to delete slot');
            };
          });
        } catch (e) {
          tbody.innerHTML = '<tr><td colspan="6">Error loading shows.</td></tr>';
        }
      }

      document.getElementById('edit-show-form').addEventListener('submit', async function(evt){
        evt.preventDefault();
        const id = document.getElementById('edit-show-id').value;
        const formBody = new URLSearchParams(new FormData(this));
        const res = await fetch(`/admin/shows/${id}/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: formBody
        });

        if (res.ok) {
          editShowModal.style.display = 'none';
          loadShowsForFilter();
          return;
        }

        const message = await res.text();
        alert(message || 'Failed to update show');
      });

      function initializeSectionToggles() {
        const headers = document.querySelectorAll('.section-header');

        headers.forEach((header) => {
          const content = header.nextElementSibling;
          if (!content || !content.classList.contains('section-content')) return;

          const icon = header.querySelector('.toggle-icon');
          const syncState = () => {
            const expanded = !content.classList.contains('hidden');
            header.setAttribute('aria-expanded', String(expanded));
            if (icon) icon.classList.toggle('rotate', expanded);
          };

          const onToggle = () => {
            content.classList.toggle('hidden');
            syncState();
          };

          header.addEventListener('click', onToggle);
          header.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              onToggle();
            }
          });

          syncState();
        });
      }

      initializeSectionToggles();

      fetchMovies();
      document.querySelector('.shows-table tbody').innerHTML = '<tr><td colspan="6">Select theatre and movie to view shows.</td></tr>';

    })();
  </script>
</body>
</html>
