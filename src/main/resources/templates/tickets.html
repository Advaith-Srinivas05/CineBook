<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Tickets - CineBook</title>
  <link rel="stylesheet" href="/css/styles.css" th:href="@{/css/styles.css}">
  <script src="/js/ui.js" th:src="@{/js/ui.js}"></script>
  <script src="/js/theme.js" th:src="@{/js/theme.js}"></script>
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-top">
      <a href="/" th:href="@{/}" class="logo"><img src="/images/title-nobg.png" alt="CineBook" style="height: 40px; margin-top: -5px;"></a>
      <div class="search-bar">
        <input type="text" placeholder="Search for Movies, Events, Plays, Sports and Activities">
      </div>
      <div class="header-right">
        <div class="location-selector">
          📍 Select Location
        </div>
        <th:block th:replace="~{fragments/header-user-controls :: userControls}"></th:block>
      </div>
    </div>
    <!-- <nav>
      <ul class="nav-links">
        <li><a href="/" th:href="@{/}">Movies</a></li>
        <li><a href="#stream">Stream</a></li>
        <li><a href="#events">Events</a></li>
        <li><a href="#plays">Plays</a></li>
        <li><a href="#sports">Sports</a></li>
        <li><a href="#activities">Activities</a></li>
        <li><a href="#buzz">Buzz</a></li>
      </ul>
    </nav> -->
  </header>

  <!-- Main Content -->
  <main>
    <!-- Booking Summary -->
    <section>
      <div class="booking-summary">
        <div class="summary-item">
          <span class="summary-label">Movie</span>
          <span class="summary-value" th:text="${movie.title}">Movie</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Theatre</span>
          <span class="summary-value" th:text="${theater.name}">Theatre</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Showtime</span>
          <span class="summary-value" th:text="${#temporals.format(schedule.startTime, 'hh:mm a') + ' | Screen ' + schedule.screen}">Showtime</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Date</span>
          <span class="summary-value" th:text="${#temporals.format(showDate, 'dd MMM yyyy')}">Date</span>
        </div>
      </div>
    </section>

    <!-- Ticket Selection -->
    <section id="ticket-selector">
      <h1 class="section-title">Select Number of Tickets</h1>
      <form th:action="@{/seats}" action="/seats" method="get">
        <input type="hidden" name="movieId" th:value="${movie.id}">
        <input type="hidden" name="theaterId" th:value="${theater.id}">
        <input type="hidden" name="scheduleId" th:value="${schedule.id}">
        <input type="hidden" name="date" th:value="${showDate}">

        <div class="ticket-count-grid">
          <button type="submit" class="ticket-count" name="ticketCount" value="1">1</button>
          <button type="submit" class="ticket-count" name="ticketCount" value="2">2</button>
          <button type="submit" class="ticket-count" name="ticketCount" value="3">3</button>
          <button type="submit" class="ticket-count" name="ticketCount" value="4">4</button>
          <button type="submit" class="ticket-count" name="ticketCount" value="5">5</button>
          <button type="submit" class="ticket-count" name="ticketCount" value="6">6</button>
          <button type="submit" class="ticket-count" name="ticketCount" value="7">7</button>
          <button type="submit" class="ticket-count" name="ticketCount" value="8">8</button>
          <button type="submit" class="ticket-count" name="ticketCount" value="9">9</button>
          <button type="submit" class="ticket-count" name="ticketCount" value="10">10</button>
        </div>
      </form>
    </section>
  </main>

  <th:block th:replace="~{fragments/auth-modal :: authModal}"></th:block>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 CineBook. All rights reserved.</p>
  </footer>
</body>
</html>
