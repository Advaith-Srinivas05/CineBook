<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking History - CineBook</title>
  <link rel="stylesheet" href="/css/styles.css" th:href="@{/css/styles.css}">
  <link rel="stylesheet" href="/css/booking-history.css" th:href="@{/css/booking-history.css}">
  <script src="/js/ui.js" th:src="@{/js/ui.js}"></script>
  <script src="/js/theme.js" th:src="@{/js/theme.js}"></script>
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <div class="page-wrapper">
    <header>
      <div class="header-top header-top-balanced">
        <div class="header-side-left">
          <a href="/" th:href="@{/}" class="logo"><img src="/images/title-nobg.png" alt="CineBook" style="height: 40px; margin-top: -5px;"></a>
        </div>
        <div class="search-bar search-bar-center">
          <input type="text" placeholder="Search for Movies, Events, Plays, Sports and Activities">
        </div>
        <div class="header-right header-side-right">
          <div class="header-location-pill" th:if="${currentUserRecord != null and currentUserRecord.location != null and !#strings.isEmpty(currentUserRecord.location)}">
            <span aria-hidden="true">📍</span>
            <span th:text="${currentUserRecord.location}">Location</span>
          </div>
          <th:block th:replace="~{fragments/header-user-controls :: userControls}"></th:block>
        </div>
      </div>
      <nav>
        <ul class="nav-links">
          <li><a href="/" th:href="@{/}">Movies</a></li>
          <li><a href="/profile" th:href="@{/profile}">Profile</a></li>
          <li><a href="/rating-history" th:href="@{/rating-history}">Rating History</a></li>
          <li><a href="/booking-history" th:href="@{/booking-history}">Booking History</a></li>
        </ul>
      </nav>
    </header>

    <main class="content">
      <section class="history-panel">
        <h1 class="section-title">Booking History</h1>

        <div th:if="${#lists.isEmpty(bookingHistory)}" class="history-empty">
          You have not booked any tickets yet.
        </div>

        <div th:if="${!#lists.isEmpty(bookingHistory)}" class="history-list">
          <article class="history-card" th:each="booking : ${bookingHistory}">
            <a class="history-ticket-link"
               href="/ticket/public-id"
               th:href="@{'/ticket/' + ${booking.publicId}}"
               title="View Ticket"
               aria-label="View Ticket">
              <img class="history-ticket-icon"
                   src="/images/external-link.svg"
                   th:src="@{/images/external-link.svg}"
                   alt="View Ticket"
                   title="View Ticket">
            </a>
            <h3 th:text="${booking.show.movie.title}">Movie Name</h3>
            <p><strong>Theater:</strong> <span th:text="${booking.show.theater.name}">Theater</span></p>
            <p>
              <strong>Date &amp; Time:</strong>
              <span th:text="${#temporals.format(booking.showDate, 'dd MMM yyyy') + ' | ' + #temporals.format(booking.show.startTime, 'hh:mm a')}">Date & Time</span>
            </p>
            <p><strong>Seats:</strong> <span th:text="${booking.seatNumbers}">A1,A2</span></p>
          </article>
        </div>
      </section>
    </main>

    <th:block th:replace="~{fragments/auth-modal :: authModal}"></th:block>

    <footer>
      <p>&copy; 2026 CineBook. All rights reserved.</p>
    </footer>
  </div>
  <script src="/js/booking-history.js" th:src="@{/js/booking-history.js}"></script>
</body>
</html>
