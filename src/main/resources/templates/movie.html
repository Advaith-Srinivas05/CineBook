<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - CineBook</title>
  <link rel="stylesheet" href="/css/styles.css" th:href="@{/css/styles.css}">
  <link rel="stylesheet" href="/css/movie.css" th:href="@{/css/movie.css}">
  <script src="/js/ui.js" th:src="@{/js/ui.js}"></script>
  <script src="/js/theme.js" th:src="@{/js/theme.js}"></script>
  <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
  <header>
    <div class="header-top">
      <a href="/" th:href="@{/}" class="logo"><img src="/images/title-nobg.png" alt="CineBook" style="height: 40px; margin-top: -5px;"></a>
      <div class="search-bar">
        <input type="text" placeholder="Search for Movies, Events, Plays, Sports and Activities">
      </div>
      <div class="header-right">
        <form class="location-selector" th:action="@{/movie}" action="/movie" method="post">
          <input type="hidden" name="movieId" th:value="${movie.id}">
          <input type="hidden" name="date" th:value="${selectedDate}">
          <label for="city-select">📍</label>
          <select id="city-select" name="city" onchange="this.form.submit()">
            <option th:if="${#lists.isEmpty(cities)}" value="">No locations</option>
            <option th:each="cityName : ${cities}"
                    th:value="${cityName}"
                    th:text="${cityName}"
                    th:selected="${cityName == selectedCity}">
              Select Location
            </option>
          </select>
        </form>
        <th:block th:replace="~{fragments/header-user-controls :: userControls}"></th:block>
      </div>
    </div>
    <!-- <nav>
      <ul class="nav-links">
        <li><a href="/" th:href="@{/}">Movies</a></li>
        <li><a href="#stream">Stream</a></li>
        <li><a href="#events">Events</a></li>
        <li><a href="#plays">Plays</a></li>
        <li><a href="#sports">Sports</a></li>
        <li><a href="#activities">Activities</a></li>
        <li><a href="#buzz">Buzz</a></li>
      </ul>
    </nav> -->
  </header>

  <main>
    <section id="movie-info" th:attr="data-movie-id=${movie.id},data-is-logged-in=${session.username != null}">
      <div class="movie-details">
        <div id="movie-details-content" class="content-row">
          <div class="left-section">
            <div class="poster-section">
              <img class="movie-poster"
                   th:src="@{/movie/poster/{id}(id=${movie.id})}"
                   th:alt="${movie.title + ' poster'}"
                   style="max-width: 220px; border-radius: 8px;">
            </div>

            <div class="rating-section">
              <div id="movie-rating-widget"
                   class="movie-rating-widget"
                   th:attr="data-movie-id=${movie.id},data-is-logged-in=${session.username != null}">
                <p class="rating-heading">Rate This Movie</p>
                <div class="star-row" aria-label="Rate this movie out of five stars">
                  <button type="button" class="rating-star" data-rating="1" aria-label="1 star">&#9733;</button>
                  <button type="button" class="rating-star" data-rating="2" aria-label="2 stars">&#9733;</button>
                  <button type="button" class="rating-star" data-rating="3" aria-label="3 stars">&#9733;</button>
                  <button type="button" class="rating-star" data-rating="4" aria-label="4 stars">&#9733;</button>
                  <button type="button" class="rating-star" data-rating="5" aria-label="5 stars">&#9733;</button>
                </div>
                <p id="movie-user-rating" class="rating-meta">Your rating: Not rated</p>
              </div>
            </div>
          </div>

          <div class="right-section">
            <div class="top-row">
              <div class="movie-meta-grid">
                <div class="detail-item">
                  <span class="detail-label">Movie</span>
                  <span class="detail-value" th:text="${movie.title + ' (' + (movie.certification != null && !movie.certification.isBlank() ? movie.certification : 'N/A') + ')'}">Movie Title (N/A)</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Runtime</span>
                  <span class="detail-value"
                        th:text="${movie.durationMinutes != null ? (movie.durationMinutes / 60) + 'h ' + (movie.durationMinutes % 60) + 'm' : 'Runtime unavailable'}">
                    Runtime
                  </span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Rating</span>
                  <span id="movie-detail-rating"
                        class="detail-value"
                        th:text="${movie.rating != null ? movie.rating : 'N/A'}">
                    N/A
                  </span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Language</span>
                  <span class="detail-value" th:text="${movie.language != null ? movie.language : 'N/A'}">Language</span>
                </div>
              </div>
              <button id="movie-details-toggle"
                      type="button"
                      class="movie-details-toggle"
                      aria-expanded="true"
                      aria-controls="movie-details-content"
                      aria-label="Collapse details">
                <span class="toggle-text">Collapse</span>
                <span class="toggle-chevron" aria-hidden="true">⌃</span>
              </button>
            </div>

            <div class="description-section">
              <div class="detail-item description-item">
                <span class="detail-label">Description</span>
                <br>
                <span class="detail-desc" th:text="${movie.description != null && !movie.description.isBlank() ? movie.description : 'Description unavailable'}">Description unavailable</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section>
      <h2 class="movie-section-title">Select Date</h2>
      <div id="date-selector"
           th:attr="data-movie-id=${movie.id},data-selected-city=${selectedCity},data-selected-date=${selectedDate}">
      </div>
    </section>

    <section>
      <h2 class="movie-section-title" style="margin-bottom: 0.5rem;">Select Theatre & Showtime</h2>
      <div id="theatre-list">
        <article class="theatre-card" th:each="entry : ${theaterShows}" th:attr="data-theatre-id=${entry.theaterId}">
          <div class="theatre-row">
            <div class="theatre-info">
              <div class="theatre-name" th:text="${entry.theaterName + ' - ' + entry.city}">Theater</div>
              <div class="movie-genre" th:if="${entry.location != null && !entry.location.isBlank()}" th:text="${entry.location}">Location</div>
            </div>
            <div class="showtime-list">
                <form th:each="show : ${entry.shows}"
                      th:action="@{/showtimes}"
                      action="/showtimes"
                      method="post"
                      class="showtime-form">
                  <input type="hidden" name="movieId" th:value="${movie.id}">
                  <input type="hidden" name="theaterId" th:value="${entry.theaterId}">
                  <input type="hidden" name="scheduleId" th:value="${show.scheduleId}">
                  <input type="hidden" name="selectedDate" th:value="${selectedDate}">
                  <input type="hidden" name="city" th:value="${selectedCity}">
                  <button type="submit"
                          class="showtime-button"
                          th:classappend="${show.bookingOpen} ? ' available' : ' sold-out booking-closed'"
                          data-requires-auth="true"
                          th:data-booking-open="${show.bookingOpen}"
                          th:aria-disabled="${!show.bookingOpen}"
                          th:tabindex="${show.bookingOpen ? 0 : -1}"
                          th:disabled="${!show.bookingOpen}"
                          th:aria-label="${'Showtime ' + #temporals.format(show.startTime, 'hh:mm a') + (show.bookingOpen ? '. Hover for ticket prices.' : '. Booking closed for this show.')}">
                    <span class="showtime-time" th:text="${#temporals.format(show.startTime, 'hh:mm a')}">Showtime</span>
                    <div class="showtime-price-popover tooltip" aria-hidden="true">
                      <div class="popover-tier tier">
                        <span class="tier-price price" th:text="${'₹' + #numbers.formatDecimal(show.ticketPrice, 1, 2)}">₹250.00</span>
                        <span class="tier-type type">NORMAL</span>
                        <span class="tier-status status"
                              th:classappend="${' ' + show.normalStatusClass}"
                              th:text="${show.normalStatusLabel}">Available</span>
                      </div>
                      <div class="popover-tier tier">
                        <span class="tier-price price" th:text="${'₹' + #numbers.formatDecimal(show.eliteTicketPrice, 1, 2)}">₹350.00</span>
                        <span class="tier-type type">ELITE</span>
                        <span class="tier-status status"
                              th:classappend="${' ' + show.eliteStatusClass}"
                              th:text="${show.eliteStatusLabel}">Filling Fast</span>
                      </div>
                    </div>
                  </button>
                </form>
            </div>
          </div>
        </article>
        <p th:if="${#lists.isEmpty(theaterShows)}">No theaters found for the selected city and date.</p>
      </div>
    </section>
  </main>

  <th:block th:replace="~{fragments/auth-modal :: authModal}"></th:block>

  <footer>
    <p>&copy; 2026 CineBook. All rights reserved.</p>
  </footer>
  <script src="/js/movie.js" th:src="@{/js/movie.js}"></script>
</body>
</html>
